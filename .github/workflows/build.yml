name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - run: npm ci
      - run: npm run build
      - run: npm run electron:build:portable
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MrSolde
          path: dist-electron\MrSolde.exe   # ← chemin relatif (pas absolu)
